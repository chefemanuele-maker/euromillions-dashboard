services:
  - type: web
    name: euromillions-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 120 app:app
    healthCheckPath: /

  - type: cron
    name: euromillions-dashboard-refresh
    env: python
    plan: free
    schedule: "*/30 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python refresh_job.py